<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Craft Learning</title>
    <style>
        /* General Reset */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container for the page content */
        .container {
            width: 90%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #ddd;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-image {
            width: 50px;
            height: auto;
        }

        .company-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        /* Navigation Styles */
        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav ul li a {
            text-decoration: none;
            color: #555;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #007bff;
        }

        /* Admin Login Button */
        .admin-login {
            background-color: #ffc107;
            color: #000;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Hero Section */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 60px 0;
        }

        .hero-content {
            flex: 1;
        }

        .hero-content h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #222;
        }

        .hero-content p {
            line-height: 1.6;
            color: #666;
            margin-bottom: 25px;
        }

        .hero-image {
            flex: 1;
            text-align: right;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-book {
            background-color: #000;
            color: #fff;
        }

        .btn-apply {
            border: 2px solid #000;
            color: #000;
        }

        /* Tech Stack Section */
        .tech-stack {
            text-align: center;
            padding: 40px 0;
        }

        .tech-icons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 20px;
        }

        .tech-icons img {
            width: 50px;
            height: 50px;
            filter: grayscale(100%);
            transition: filter 0.3s;
        }

        .tech-icons img:hover {
            filter: grayscale(0%);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-group">
            <img src="https://www.codecraftlearning.in/assets/images/2L1.png">
            <span class="company-name">Code Craft Learning</span>
        </div>
        <nav>
            <ul>
                <li><a href="#">About</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Collaboration</a></li>
                <li><a href="#">Testimonials</a></li>
                <li><a href="#">Certification</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#" class="admin-login">Admin Login</a></li>
            </ul>
        </nav>
    </header>
</body>
</html>
