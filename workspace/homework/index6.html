<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        body {
            background-color: #090c15;
        }

        .bg-hero {
            width: 100%;
            position: relative;
            height: 100vh;
        }

        .bg-hero > .bg-hero-blue, .bg-hero > .bg-hero-purple {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
        }

        .bg-hero > .bg-hero-blue {
            top: 19%;
            left: 24%;
            background-color: #16133c;

        }
        
        .bg-hero > .bg-hero-purple {
            top: 5%;
            right: 24%;
            background-color: #1f0c3a;   
        }


    </style>
</head>
<body>

    <div class="bg-hero">
        <div class="bg-hero-blue"></div>
        <div class="bg-hero-purple"></div>
    </div>

</body>
</html>
