<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      body {
        position: relative;
        margin: 0px;
        padding: 0px;
      }

      .container {
        position: relative;
        width: 300px;
        height: 300px;
        border: 1px solid red;
      }

      .item {
        position: absolute;
        display: inline-block;
        width: 100px;
        height: 100px;
        border: 1px solid black;
        border-radius: 50%;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item"></div>
    </div>
  </body>
</html>
