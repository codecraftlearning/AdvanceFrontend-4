<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>

        body {
            position: relative;
            background-color: rgb(231, 255, 242);
        }

        .header-section {
            margin-bottom: 20px;
            background-color: rgb(35, 41, 92);
            padding: 10px;
            border-radius: 8px;
        }

        .header-section > .header {
            margin: 0px;
            text-align: center;
            color: white;
        }


        .form-area {
            position: absolute;
            width: 500px;
            padding: 20px;
            border-radius: 8px;
            border-color: rgba(212, 47, 47, 0.568);
            background-color: rgba(255, 255, 255, 0.568);
            left: 50%;
            transform: translateX(-50%);
        }

        .form-area > .form-legend {
            font-weight: 400;
            font-style: italic;
        }
        </style>


    </head>
    <body> 

        <div>
     <h1> Student Registraion Form </h1>
        </div>

        <fieldset>

      <legend>Registraion form </legend>
      <form action="/" method="post">
        <div>
            <label for="Fullname">Fullname</label>
            <input type="text" name="Fullname" id="fullname">
        </div>

        <div> 
            <label for="Age"></label>
            <input type="number" name="Age" id="Age">
        </div>
        <div>
            <label for="Address">Address</label>
            <textarea name="Address" id="Address" cols="20" rows="5"></textarea>
        </div>
        <div>
         <label for="dob">date of Birth</label>
         <input type="date" name="dob" id="dob">
        </div>
        <div>
            <label for="">Gender</label>
            <input type="radio" name="gender" id="gendermale">
            <label for="gendermale">Male</label>
            <input type="radio" name="gender" id="genderfemale">
            <label for="genderfemale">Female</label>
            <input type="radio" name="gender" id="genderother">
            <label for="genderfemale">Other</label>
            
        </div>
        <input type="submit" name="" id="" value="Create Student">
      </form>
        </fieldset>
      
    </body>
    </html>
