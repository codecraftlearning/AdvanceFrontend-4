<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .parent {
        border: 1px solid black;
        height: 500px;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 20px;
      }

      .parent > .child {
        border: 1px solid blue;
        height: 100px;
        width: 300px;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 20px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child">
        <a href="">a</a>
        <a href="">b</a>
        <a href="">c</a>
      </div>

      <div class="child">
        <a href="">d</a>
        <a href="">e</a>
      </div>
    </div>
  </body>
</html>
