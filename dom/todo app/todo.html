<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        width: 100%;
        height: auto;
        display: flex;
        flex-direction: row;
        padding: 20px;
        justify-content: center;
      }

      .container > .todo-app {
        width: 45%;
        height: auto;
        min-height: 400px;
        border: 1px solid rgb(162, 162, 162);
        border-radius: 24px;
        padding: 20px;
        background-color: rgb(255, 254, 240);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .todo-app > .title {
        font-size: 2em;
        font-weight: 700;
        text-align: center;
      }

      .todo-app > .cta-container {
        display: flex;
        flex-direction: row;
        gap: 10px;
        justify-content: center;
        width: 100%;
      }

      .cta-container > input {
        padding: 5px 10px;
        font-size: 1em;
        border-radius: 10px;
        outline: none;
        border: 1px solid rgb(162, 162, 162);
      }

      .cta-container > button {
        padding: 5px 20px;
        font-size: 1em;
        border-radius: 10px;
        outline: none;
        border: 1px solid rgb(162, 162, 162);
        background-color: rgb(202, 255, 202);
        color: black;
        font-weight: 500;
        cursor: pointer;
      }

      .cta-container > button:hover {
        background-color: rgb(171, 252, 171);
      }

      .todo-app > .tasks {
        padding: 0px 30px 0px 10px;
        border: 1px solid rgb(162, 162, 162);
        border-radius: 12px;
      }

      .tasks > ol > li {
        font-size: 1em;
        margin-bottom: 4px;
      }

      .list-item-container {
        width: 100%;
        display: flex;
        padding: 2px 5px;
        justify-content: space-between;
        border: 1px solid rgb(136, 136, 136);
        border-radius: 8px;
        align-items: center;
      }

      .list-item-container > div {
        display: flex;
        gap: 4px;
      }

      .list-item-container > div > button {
        width: 18px;
        height: 18px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
      }

      .list-item-container:hover {
        background-color: aliceblue;
      }


    </style>
  </head>
  <body>
    <div class="container">
      <div class="todo-app">
        <h1 class="title">My TO-DO List</h1>
        <div class="cta-container">
          <input id="taskInput" type="text" placeholder="Add a task" />
          <button onclick="fetchTask()">Add</button>
        </div>
        <fieldset class="tasks">
          <legend>Pending Tasks</legend>
          <ol id="pendingTasks" type="1"></ol>
        </fieldset>
        <fieldset class="tasks">
          <legend>Completed Tasks</legend>
          <ol id="completedTasks" type="1"></ol>
        </fieldset>
      </div>
    </div>

    <script>
      const taskInputEL = document.getElementById("taskInput");
      const pendingTasksEl = document.getElementById("pendingTasks");

      function createTODOTextEl(taskName) {
        const listItemtextEl = document.createElement("span");
        listItemtextEl.textContent = taskName;

        return listItemtextEl;
      }

      function removePendingItem(event) {
        const listItem = event.target.parentNode.parentNode.parentNode;
        pendingTasksEl.removeChild(listItem);
      }

      function createTaskCTAs() {
        const listitemCompletedCTA = document.createElement("button");
        listitemCompletedCTA.innerHTML = "&check;";

        const listItemRemove = document.createElement("button");
        listItemRemove.onclick = ($event) => removePendingItem($event);
        listItemRemove.textContent = "x";

        return [listitemCompletedCTA, listItemRemove];
      }

      function createTODOItem(taskName) {
        const listItemContainerEL = document.createElement("div");
        listItemContainerEL.classList.add('list-item-container');

        const ctas = document.createElement("div");
        ctas.append(...createTaskCTAs());

        listItemContainerEL.append(createTODOTextEl(taskName), ctas);
        return listItemContainerEL;
      }

      function fetchTask() {
        const newTask = taskInputEL.value.trim();
        if (newTask === "") {
          return;
        }

        taskInputEL.value = "";
        const newTaskEl = document.createElement("li");
        newTaskEl.appendChild(createTODOItem(newTask));
        pendingTasksEl.appendChild(newTaskEl);
      }
    </script>
  </body>
</html>
